services:
  db:
    image: mysql:8.0
    container_name: license_platform_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: license_platform
      MYSQL_USER: license_user
      MYSQL_PASSWORD: license_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./app/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - license_network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: license_platform_php
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: license_platform
      DB_USER: license_user
      DB_PASS: license_pass
    volumes:
      - .:/var/www/html
      - ./uploads:/var/www/html/uploads
    networks:
      - license_network

  nginx:
    image: nginx:alpine
    container_name: license_platform_nginx
    depends_on:
      - php
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "959:80"
    networks:
      - license_network

volumes:
  db_data:

networks:
  license_network:
    driver: bridge
